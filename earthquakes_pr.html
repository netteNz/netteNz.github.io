<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive visualization of earthquake data in Puerto Rico using PyScript and Folium">
    <meta name="keywords" content="earthquake visualization, data visualization, folium, pyscript, interactive map">
    <title>Earthquake Visualization — nettenzOS</title>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0L5LLER0MH"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-0L5LLER0MH');
    </script>

    <!-- Fonts & Tailwind -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;500;600;700&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Main design system — M3 vars, wallpaper, glass, dock, etc. -->
    <link rel="stylesheet" href="./assets/css/main.css">

    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.3.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.3.1/core.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Lato', sans-serif;
            background: var(--md-surface);
        }

        /* Wallpaper sits behind everything */
        .page-wallpaper {
            position: fixed;
            inset: 0;
            top: 32px;
            background: linear-gradient(160deg, #06060a 0%, #08090f 50%, #060a0a 100%);
            overflow: hidden;
            z-index: 0;
            isolation: isolate;
        }

        /* Dim blobs so Leaflet tiles remain readable */
        .page-wallpaper .wallpaper-blob { opacity: 0.4; }
        .page-wallpaper .wallpaper-scrim { background: rgba(6, 6, 10, 0.45); }

        /* Map fills everything below the 32px menu bar */
        #map-area {
            position: fixed;
            top: 32px;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }

        /* PyScript auto-inserts a wrapper; force it to fill */
        .pyscript {
            width: 100% !important;
            height: 100% !important;
            display: flex !important;
            flex-direction: column !important;
        }

        #folium {
            width: 100% !important;
            height: 100% !important;
            flex: 1 1 auto !important;
        }

        .leaflet-container {
            width: 100% !important;
            height: 100% !important;
        }

        /* ─── Legend panel (dock / glass aesthetic) ─── */
        .eq-legend {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
        }

        .eq-legend-inner {
            background: linear-gradient(
                180deg,
                rgba(30, 30, 40, 0.78) 0%,
                rgba(10, 10, 16, 0.92) 100%
            );
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--shape-lg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.10),
                inset 0 -1px 0 rgba(0, 0, 0, 0.35),
                0 8px 24px rgba(0, 0, 0, 0.55),
                0 24px 56px rgba(0, 0, 0, 0.35);
            padding: 14px 18px;
            min-width: 168px;
        }

        .eq-legend-title {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 10px;
            font-weight: 600;
            color: var(--md-primary);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 11px;
            padding-bottom: 9px;
            border-bottom: 1px solid var(--md-outline-variant);
        }

        .eq-legend-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .eq-legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 12px;
            color: var(--md-on-surface-variant);
        }

        .eq-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .eq-dot-minor    { background: #4ade80; box-shadow: 0 0 6px rgba(74, 222, 128, 0.6); }
        .eq-dot-light    { background: #facc15; box-shadow: 0 0 6px rgba(250, 204, 21, 0.6); }
        .eq-dot-moderate { background: #f97316; box-shadow: 0 0 6px rgba(249, 115, 22, 0.6); }
        .eq-dot-strong   { background: #f87171; box-shadow: 0 0 6px rgba(248, 113, 113, 0.6); }

        /* ─── Loading dialog ─── */
        #loading {
            outline: none;
            border: none;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Back nav pill inside menu bar */
        .nav-back-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: var(--md-on-surface-variant);
            text-decoration: none;
            padding: 2px 10px;
            border-radius: var(--shape-full);
            transition:
                color var(--dur-2) var(--ease-standard),
                background var(--dur-2) var(--ease-standard);
        }

        .nav-back-btn:hover {
            color: var(--md-on-surface);
            background: rgba(120, 239, 157, 0.08);
        }

        .nav-page-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--md-primary);
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            letter-spacing: 0.01em;
        }
    </style>
</head>

<body>
    <!-- ─── macOS Menu Bar ─── -->
    <div class="menu-bar fixed top-0 left-0 right-0 h-8 backdrop-blur-md z-50 flex items-center px-4">
        <div class="flex items-center space-x-2 sm:space-x-3 truncate">
            <span class="text-white text-sm font-medium hidden sm:inline">nettenzOS</span>
            <span class="text-gray-600 text-xs hidden sm:inline">›</span>
            <span class="nav-page-label truncate">earthquakes-pr</span>
        </div>

        <div class="flex items-center space-x-2 ml-4 sm:ml-6">
            <a href="index.html" class="nav-back-btn">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                <span class="hidden sm:inline">Home</span>
            </a>
        </div>

        <div class="ml-auto flex items-center space-x-2 sm:space-x-3 text-white text-sm">
            <div class="flex items-center space-x-2 menu-bar-icons">
                <!-- WiFi -->
                <svg class="w-4 h-4 text-white status-icon wifi-icon" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.07 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
                </svg>
                <!-- Bluetooth -->
                <svg class="w-4 h-4 text-blue-400 status-icon" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M17.71 7.71L12 2h-1v7.59L6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 11 14.41V22h1l5.71-5.71-4.3-4.29 4.3-4.29zM13 5.83l1.88 1.88L13 9.59V5.83zm1.88 10.46L13 18.17v-3.76l1.88 1.88z"/>
                </svg>
                <!-- Battery -->
                <div class="flex items-center space-x-1 battery-icon">
                    <svg class="w-4 h-4 text-green-400 status-icon" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M15.67 4H14V2c0-0.55-0.45-1-1-1h-2c-0.55 0-1 0.45-1 1v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c0.74 0 1.34-0.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/>
                        <rect x="9" y="6" width="6" height="12" rx="1" fill="currentColor"/>
                    </svg>
                    <span class="text-xs battery-level-text">87%</span>
                </div>
            </div>
            <span id="current-time" class="text-sm"></span>
        </div>
    </div>

    <!-- ─── Animated wallpaper (ambient, behind map) ─── -->
    <div class="page-wallpaper" aria-hidden="true">
        <div class="wallpaper-blob wallpaper-blob--green"></div>
        <div class="wallpaper-blob wallpaper-blob--blue"></div>
        <div class="wallpaper-blob wallpaper-blob--purple"></div>
        <div class="wallpaper-scrim"></div>
    </div>

    <!-- ─── Map area ─── -->
    <div id="map-area">
        <!-- Loading dialog -->
        <dialog id="loading">
            <div class="flex flex-col items-center justify-center p-8">
                <div class="spinner"></div>
                <div class="loading-text">Loading visualization...</div>
            </div>
        </dialog>

        <!-- Folium renders into this -->
        <div id="folium"></div>
    </div>

    <!-- ─── Magnitude legend ─── -->
    <div class="eq-legend">
        <div class="eq-legend-inner">
            <div class="eq-legend-title">Magnitude</div>
            <div class="eq-legend-items">
                <div class="eq-legend-item">
                    <span class="eq-dot eq-dot-minor"></span>
                    <span>&lt; 3.0</span>
                </div>
                <div class="eq-legend-item">
                    <span class="eq-dot eq-dot-light"></span>
                    <span>3.0 – 4.0</span>
                </div>
                <div class="eq-legend-item">
                    <span class="eq-dot eq-dot-moderate"></span>
                    <span>4.1 – 5.0</span>
                </div>
                <div class="eq-legend-item">
                    <span class="eq-dot eq-dot-strong"></span>
                    <span>&gt; 5.0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- PyScript -->
    <script type="py" src="./projects/earthquake-map/main.py" config="./pyscript.toml"></script>

    <script>
        // Live clock matching index.html
        function updateTime() {
            const el = document.getElementById('current-time');
            if (el) {
                el.textContent = new Date().toLocaleTimeString('en-US', {
                    hour: 'numeric', minute: '2-digit', hour12: true
                });
            }
        }
        updateTime();
        setInterval(updateTime, 1000);

        // Loading dialog management
        const loading = document.getElementById('loading');

        document.addEventListener('DOMContentLoaded', () => {
            loading.showModal();
        });

        document.addEventListener('map:loaded', () => {
            setTimeout(() => { if (loading.open) loading.close(); }, 500);
        });

        // 20s hard timeout
        setTimeout(() => { if (loading.open) loading.close(); }, 20000);

        // Poll for Leaflet tiles
        const checkMapInterval = setInterval(() => {
            if (document.querySelector('.leaflet-container') &&
                document.querySelector('.leaflet-tile-loaded')) {
                if (loading.open) {
                    loading.close();
                    clearInterval(checkMapInterval);
                }
            }
        }, 1000);

        // MutationObserver fallback
        const foliumEl = document.getElementById('folium');
        if (foliumEl) {
            const obs = new MutationObserver(() => {
                if (document.querySelector('.leaflet-container')) {
                    setTimeout(() => { if (loading.open) loading.close(); obs.disconnect(); }, 1000);
                }
            });
            obs.observe(foliumEl, { childList: true, subtree: true });
        }
    </script>
</body>

</html>
